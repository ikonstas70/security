# =====================================================
# CADO-NFS parameter file
# Author: Ioannis Konstas — Information Technology
#
# Minimal working configuration for CADO-NFS 3.0.0.
# Replace N with the integer you want to factor.
# Adjust tasks.threads and server.threads to match
# the number of CPU cores on your machine.
#
# Usage:
#   cado-nfs.py myparams.conf
# =====================================================

# Number to factor
N = 123456789101112

# =====================================================
# Server configuration
# =====================================================
server.name    = localserver
server.threads = 4

# =====================================================
# Slaves (client) configuration
# =====================================================
slaves.basepath = /Users/ik-mis/CADO-workdir/tmp/client

# =====================================================
# General task settings
# =====================================================
tasks.name     = test_factor
tasks.threads  = 4
tasks.workdir  = /Users/ik-mis/CADO-workdir/tmp
tasks.execpath = /usr/local/lib/cado-nfs-3.0.0

tasks.linalg.bwc.cpubinding = /usr/local/share/cado-nfs-3.0.0/misc/cpubinding.conf

tasks.polyselect.threads = 2
tasks.sqrt.threads       = 1

# =====================================================
# Factor base settings
# =====================================================
tasks.sieve.makefb.run     = True
tasks.sieve.makefb.threads = 2

tasks.I = 37    # Controls factor base size — increase for larger numbers
tasks.A = 0     # Set to 0 for default

tasks.sieve.factorbase.lim0         = 2
tasks.sieve.factorbase.lim0_special = 2
tasks.sieve.factorbase.lim1         = 1000
tasks.sieve.factorbase.lim1_special = 100

# =====================================================
# Free relations
# =====================================================
tasks.sieve.freerel.run     = True
tasks.sieve.freerel.threads = 2
tasks.sieve.freerel.dlp     = False
tasks.sieve.freerel.gzip    = True

# =====================================================
# Lattice sieving
# Set tasks.sieve.sieving.run = True to perform sieving
# =====================================================
tasks.sieve.sieving.run    = False
tasks.sieve.sieving.qrange = 10

tasks.sieve.las.run     = False
tasks.sieve.las.threads = 2

# =====================================================
# Linear algebra
# Set tasks.linalg.bwc.run = True for a full NFS run
# =====================================================
tasks.linalg.bwc.run     = False
tasks.linalg.bwc.threads = 4

# =====================================================
# Square root (final factoring step)
# Set tasks.sqrt.run = True when ready for full run
# =====================================================
tasks.sqrt.run     = False
tasks.sqrt.threads = 1
